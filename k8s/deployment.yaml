# Kubernetes部署配置目录
# 使用: kubectl apply -f k8s/

# ==================== Namespace ====================
apiVersion: v1
kind: Namespace
metadata:
  name: aetherlife
  labels:
    name: aetherlife
---
# ==================== ConfigMap ====================
apiVersion: v1
kind: ConfigMap
metadata:
  name: aetherlife-config
  namespace: aetherlife
data:
  ENV: "production"
  LOG_LEVEL: "INFO"
  REDIS_URL: "redis://aetherlife-redis:6379/0"
  CLICKHOUSE_HOST: "aetherlife-clickhouse"
  KAFKA_BOOTSTRAP_SERVERS: "aetherlife-kafka:9092"
---
# ==================== Secrets ====================
apiVersion: v1
kind: Secret
metadata:
  name: aetherlife-secrets
  namespace: aetherlife
type: Opaque
stringData:
  OPENAI_API_KEY: "your-openai-api-key"
  IBKR_USERNAME: "your-ibkr-username"
  IBKR_PASSWORD: "your-ibkr-password"
  BINANCE_API_KEY: "your-binance-api-key"
  BINANCE_SECRET: "your-binance-secret"
---
# ==================== AetherLife Core Deployment ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aetherlife-core
  namespace: aetherlife
  labels:
    app: aetherlife
    component: core
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aetherlife
      component: core
  template:
    metadata:
      labels:
        app: aetherlife
        component: core
    spec:
      containers:
      - name: aetherlife
        image: aetherlife:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: aetherlife-config
        - secretRef:
            name: aetherlife-secrets
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /app/configs
          readOnly: true
        - name: logs-volume
          mountPath: /logs
        - name: data-volume
          mountPath: /data
      volumes:
      - name: config-volume
        configMap:
          name: aetherlife-config
      - name: logs-volume
        persistentVolumeClaim:
          claimName: aetherlife-logs-pvc
      - name: data-volume
        persistentVolumeClaim:
          claimName: aetherlife-data-pvc
---
# ==================== AetherLife Service ====================
apiVersion: v1
kind: Service
metadata:
  name: aetherlife-service
  namespace: aetherlife
  labels:
    app: aetherlife
spec:
  type: ClusterIP
  selector:
    app: aetherlife
    component: core
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
---
# ==================== Redis Deployment ====================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aetherlife-redis
  namespace: aetherlife
  labels:
    app: aetherlife
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aetherlife
      component: redis
  template:
    metadata:
      labels:
        app: aetherlife
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        args:
        - redis-server
        - --appendonly
        - "yes"
        - --maxmemory
        - "2gb"
        - --maxmemory-policy
        - allkeys-lru
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: aetherlife-redis-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: aetherlife-redis
  namespace: aetherlife
spec:
  type: ClusterIP
  selector:
    app: aetherlife
    component: redis
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
---
# ==================== PersistentVolumeClaims ====================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aetherlife-logs-pvc
  namespace: aetherlife
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aetherlife-data-pvc
  namespace: aetherlife
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aetherlife-redis-pvc
  namespace: aetherlife
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# ==================== HorizontalPodAutoscaler ====================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aetherlife-hpa
  namespace: aetherlife
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aetherlife-core
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
---
# ==================== Ingress (可选) ====================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aetherlife-ingress
  namespace: aetherlife
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - aetherlife.example.com
    secretName: aetherlife-tls
  rules:
  - host: aetherlife.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aetherlife-service
            port:
              number: 8000
