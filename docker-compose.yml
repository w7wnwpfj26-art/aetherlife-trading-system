version: '3.8'

services:
  # ==================== Core Services ====================
  
  # AetherLife主应用
  aetherlife:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: aetherlife_core
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379/0
      - CLICKHOUSE_HOST=clickhouse
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/logs
      - ./data:/data
    depends_on:
      - redis
      - clickhouse
      - kafka
    networks:
      - aetherlife_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== Data Layer ====================
  
  # Redis（内存缓存、向量存储）
  redis:
    image: redis:7-alpine
    container_name: aetherlife_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - aetherlife_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ClickHouse（时序数据存储）
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: aetherlife_clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"  # HTTP接口
      - "9000:9000"  # Native接口
    environment:
      - CLICKHOUSE_DB=trading
      - CLICKHOUSE_USER=aether
      - CLICKHOUSE_PASSWORD=aether_password
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./configs/clickhouse:/etc/clickhouse-server/config.d:ro
    networks:
      - aetherlife_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Kafka（消息队列）
  kafka:
    image: bitnami/kafka:latest
    container_name: aetherlife_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - aetherlife_network
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Monitoring ====================
  
  # Prometheus（监控数据收集）
  prometheus:
    image: prom/prometheus:latest
    container_name: aetherlife_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aetherlife_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana（监控可视化）
  grafana:
    image: grafana/grafana:latest
    container_name: aetherlife_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=aether_admin
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./configs/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - aetherlife_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== Optional Services ====================
  
  # Admin UI
  admin_ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: aetherlife_admin
    restart: unless-stopped
    ports:
      - "18789:18789"
    command: ["python", "start_admin.py"]
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
    volumes:
      - ./configs:/app/configs:ro
      - ./logs:/logs:ro
    depends_on:
      - aetherlife
    networks:
      - aetherlife_network

networks:
  aetherlife_network:
    driver: bridge

volumes:
  redis_data:
  clickhouse_data:
  kafka_data:
  prometheus_data:
  grafana_data:
